<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Te unes a la aventura?</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="space-background"></div>

    <main class="card-container">
        <div class="hologram-wrapper">
            <div class="hologram-glow"></div>
            <div class="pet-egg">
                <div class="heart-core">❤️</div>
            </div>
        </div>

        <div class="text-window">
            <h1 class="glitch-title">SISTEMA: VÍNCULO</h1>
            <p class="message-text" id="typed-text"></p>
        </div>

        <div class="button-group">
            <button id="btn-yes" class="btn btn-neon">¡SÍ, LE ENTRA! 🚀</button>
            <button id="btn-no" class="btn btn-ghost">No, gracias 🤖</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
